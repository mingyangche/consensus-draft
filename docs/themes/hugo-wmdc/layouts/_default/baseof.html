<!DOCTYPE html>
<html lang="{{ .Site.Language.Lang }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ .Site.Params.description }}">
  <meta name="keywords" content="{{ range .Site.Params.keywords }}{{ . }}, {{ end }}">
  <title>{{ .Site.Title }} | {{ .Title }}</title>
  <link rel="stylesheet" href="{{ "css/style.css" | relURL }}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
</head>
<body>
  <div class="container">
    <header class="header">
      <div class="logo">
        <a href="{{ "/" | relURL }}">🧘 {{ .Site.Title }}</a>
      </div>
      <nav class="nav">
        <a href="{{ "about" | relURL }}">About</a>
        <a href="{{ "consensus" | relURL }}">Consensus</a>
        <a href="{{ "contribute" | relURL }}">Contribute</a>
        <a href="{{ "contact" | relURL }}">Contact</a>
      </nav>
    </header>
    <main class="main">
      {{ block "main" . }}{{ end }}
    </main>
    <footer class="footer">
      <div class="footer-content">
        <p>&copy; {{ now.Year }} {{ .Site.Title }}. Built with harmony.</p>
        <p>
          <a href="{{ .Site.Params.github }}">GitHub</a> · 
          <a href="{{ "privacy" | relURL }}">Privacy</a>
        </p>
      </div>
    </footer>
  </div>
</body>
</html>
